<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Title }}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#fff5f5;color:#333;max-width:750px;margin:0 auto;padding:20px 15px;line-height:1.8}
header{margin-bottom:30px;text-align:center}
header h1{font-size:28px;color:#FFA398;margin-bottom:8px}
header p{color:#FFBABA;font-size:14px}
.article-card{background:#fff;border-radius:12px;padding:25px;margin-bottom:20px;box-shadow:0 2px 8px rgba(255,163,152,0.15)}
.article-title{font-size:20px;color:#222;margin-bottom:10px;font-weight:600}
.article-meta{font-size:13px;color:#FFA398;margin-bottom:15px}
.article-preview{max-height:150px;overflow:hidden;position:relative;margin-bottom:12px}
.article-preview::after{content:"";position:absolute;bottom:0;left:0;width:100%;height:50px;background:linear-gradient(transparent,#fff)}
.toggle-btn{display:block;width:120px;height:36px;line-height:36px;text-align:center;background:#FFA398;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;margin:0 auto}
.toggle-btn:hover{background:#FFBABA}
.pagination{margin-top:40px;text-align:center}
.pagination a{display:inline-block;padding:8px 16px;margin:0 5px;background:#fff;border-radius:6px;color:#FFA398;text-decoration:none;box-shadow:0 1px 3px rgba(255,163,152,0.15)}
.pagination a:hover{background:#FFA398;color:#fff}
</style>
</head>
<body>
<header>
    <h1>{{ .Title }}</h1>
    <p>{{ .Description }}</p>
</header>
<main>
{{ range $index, $post := .Posts }}
<div class="article-card">
    <h2 class="article-title">{{ $post.Title }}</h2>
    <div class="article-meta">
        <span>{{ $post.Date }}</span>
    </div>
    <div class="article-preview" id="p{{ $index }}">
        {{ $post.Content }}
    </div>
    <button class="toggle-btn" onclick="toggle('p{{ $index }}')">展开全文</button>
</div>
{{ end }}
</main>
<div class="pagination">
    {{ if .PrevPage }}<a href="{{ .PrevPage }}">上一页</a>{{ end }}
    {{ if .NextPage }}<a href="{{ .NextPage }}">下一页</a>{{ end }}
</div>
<script>
function toggle(id){
    const el=document.getElementById(id);
    const btn=el.nextElementSibling;
    if(el.style.maxHeight=="none"){
        el.style.maxHeight="150px";
        btn.innerText="展开全文";
    }else{
        el.style.maxHeight="none";
        btn.innerText="收起全文";
    }
}
</script>
</body>
</html>
