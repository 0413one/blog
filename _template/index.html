<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <meta name="description" content="{{ .Description }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #fff5f5; /* 浅粉色背景，与主色呼应 */
            color: #333;
            max-width: 750px;
            margin: 0 auto;
            padding: 20px 15px;
            line-height: 1.8;
        }
        header {
            margin-bottom: 30px;
            text-align: center;
        }
        header h1 {
            font-size: 28px;
            color: #FFA398; /* 主粉色标题 */
            margin-bottom: 8px;
        }
        header p {
            color: #FFBABA; /* 次粉色描述文字 */
            font-size: 14px;
        }
        /* 文章容器 - 沉浸式无封面设计 */
        .article-card {
            background: #fff;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(255, 163, 152, 0.15); /* 粉色阴影 */
        }
        .article-title {
            font-size: 20px;
            color: #222;
            margin-bottom: 10px;
            font-weight: 600;
        }
        .article-meta {
            font-size: 13px;
            color: #FFA398; /* 元数据使用主粉色 */
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
        }
        /* 预览截断样式 */
        .article-preview {
            max-height: 150px;
            overflow: hidden;
            position: relative;
            margin-bottom: 12px;
        }
        .article-preview::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: linear-gradient(to bottom, transparent, #fff);
        }
        /* 展开/收起按钮 - 粉色主题 */
        .toggle-btn {
            display: block;
            width: 120px;
            height: 36px;
            line-height: 36px;
            text-align: center;
            background-color: #FFA398; /* 主粉色按钮 */
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 0 auto;
            transition: background 0.2s;
        }
        .toggle-btn:hover {
            background-color: #FFBABA; /* 悬停时变为次粉色 */
        }
        /* 分页样式 - 粉色主题 */
        .pagination {
            margin-top: 40px;
            text-align: center;
        }
        .pagination a {
            display: inline-block;
            padding: 8px 16px;
            margin: 0 5px;
            background: #fff;
            border-radius: 6px;
            color: #FFA398; /* 分页文字主粉色 */
            text-decoration: none;
            box-shadow: 0 1px 3px rgba(255, 163, 152, 0.15);
        }
        .pagination a:hover {
            background: #FFA398; /* 悬停背景主粉色 */
            color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <h1>{{ .Title }}</h1>
        <p>{{ .Description }}</p>
    </header>

    <main>
        {{ range .Posts }}
        <div class="article-card">
            <h2 class="article-title">{{ .Title }}</h2>
            <div class="article-meta">
                <span>{{ .Date }}</span>
                <span>{{ range .Tags }}#{{ . }} {{ end }}</span>
            </div>
            <!-- 预览区域，绑定唯一ID -->
            <div class="article-preview" id="preview-{{ .ID }}">
                {{ .Content }}
            </div>
            <!-- 展开/收起按钮 -->
            <button class="toggle-btn" onclick="toggleContent('{{ .ID }}')">展开全文</button>
        </div>
        {{ end }}
    </main>

    <div class="pagination">
        {{ if .PrevPage }}
        <a href="{{ .PrevPage }}">上一页</a>
        {{ end }}
        {{ if .NextPage }}
        <a href="{{ .NextPage }}">下一页</a>
        {{ end }}
    </div>

    <!-- 展开/收起核心脚本 -->
    <script>
        function toggleContent(id) {
            const previewEl = document.getElementById(`preview-${id}`);
            const btnEl = previewEl.nextElementSibling;
            
            if (previewEl.style.maxHeight === 'none') {
                // 收起状态
                previewEl.style.maxHeight = '150px';
                btnEl.innerText = '展开全文';
            } else {
                // 展开状态
                previewEl.style.maxHeight = 'none';
                btnEl.innerText = '收起全文';
            }
        }
    </script>
</body>
</html>
