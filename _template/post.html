<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} | {{ .SiteTitle }}</title>
    <meta name="description" content="{{ .Description }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #fff5f5;
            color: #333;
            max-width: 750px;
            margin: 0 auto;
            padding: 20px 15px;
            line-height: 1.8;
        }
        header {
            margin-bottom: 30px;
            text-align: center;
        }
        header h1 {
            font-size: 28px;
            color: #FFA398;
            margin-bottom: 8px;
        }
        .post-header {
            margin-bottom: 30px;
            text-align: center;
        }
        .post-title {
            font-size: 24px;
            color: #222;
            margin-bottom: 15px;
        }
        .post-meta {
            font-size: 14px;
            color: #FFA398;
        }
        .post-content {
            background: #fff;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(255, 163, 152, 0.15);
        }
        .post-content a {
            color: #FFA398;
            text-decoration: none;
        }
        .post-content a:hover {
            text-decoration: underline;
        }
        .back-home {
            display: inline-block;
            margin-top: 30px;
            padding: 8px 16px;
            background-color: #FFA398;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .back-home:hover {
            background-color: #FFBABA;
        }
    </style>
</head>
<body>
    <header>
        <h1>{{ .SiteTitle }}</h1>
    </header>
    <div class="post-header">
        <h2 class="post-title">{{ .Title }}</h2>
        <div class="post-meta">
            {{ .Date }} · {{ range .Tags }}#{{ . }} {{ end }}
        </div>
    </div>
    <div class="post-content">
        {{ .Content }}
    </div>
    <a href="{{ .HomeLink }}" class="back-home">返回首页</a>
</body>
</html>
