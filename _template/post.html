<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Title }} | {{ .SiteTitle }}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#fff5f5;color:#333;max-width:750px;margin:0 auto;padding:20px 15px;line-height:1.8}
header{margin-bottom:30px;text-align:center}
header h1{font-size:28px;color:#FFA398}
.post-title{font-size:24px;color:#222;margin-bottom:15px;text-align:center}
.post-meta{font-size:14px;color:#FFA398;text-align:center;margin-bottom:20px}
.post-content{background:#fff;border-radius:12px;padding:25px;box-shadow:0 2px 8px rgba(255,163,152,0.15)}
.back-home{display:inline-block;margin-top:30px;padding:8px 16px;background:#FFA398;color:#fff;border-radius:8px;text-decoration:none}
.back-home:hover{background:#FFBABA}
</style>
</head>
<body>
<header>
    <h1>{{ .SiteTitle }}</h1>
</header>
<h2 class="post-title">{{ .Title }}</h2>
<div class="post-meta">{{ .Date }}</div>
<div class="post-content">
    {{ .Content }}
</div>
<a href="{{ .HomeLink }}" class="back-home">返回首页</a>
</body>
</html>
